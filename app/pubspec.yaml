name: opencode_mobile
description: OpenCode mobile client for Android - chat with AI coding agent on your phone
publish_to: 'none'
version: 1.4.1+5

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  dartssh2: ^2.11.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_secure_storage: ^9.0.0
  scrollable_positioned_list: ^0.3.8
  image_picker: ^1.0.0
  mime: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
